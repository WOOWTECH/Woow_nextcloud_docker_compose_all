apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nextcloud

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - pvc.yaml
  - db-deployment.yaml
  - db-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - nextcloud-deployment.yaml
  - nextcloud-service.yaml
  - cron-deployment.yaml

labels:
  - pairs:
      app: nextcloud
    includeSelectors: true
