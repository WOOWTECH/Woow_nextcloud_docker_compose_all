apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app: nextcloud
    component: app
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31808
      protocol: TCP
      name: http
  selector:
    app: nextcloud
    component: app
