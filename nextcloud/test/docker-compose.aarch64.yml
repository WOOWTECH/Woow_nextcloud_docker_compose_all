name: nextcloud-aarch64
services:
  nextcloud-aarch64:
    image: woowtech/woow-nextcloud:${VERSION:-latest}-aarch64
    build:
      context: ..
      args:
        BUILD_ARCH: aarch64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: nextcloud-aarch64
    ports:
      - 80:80
    environment:
      - TZ=Asia/Taipei
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
      - share:/share
      - media:/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80/status.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  data:
  config:
  share:
  media:
